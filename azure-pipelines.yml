trigger:
  branches:
    include:
      - main

variables:
  buildConfiguration: 'Release'

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: UseDotNet@2
    displayName: 'Use .NET SDK 10.x'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'

  - task: AzureCLI@2
    displayName: 'Deploy infrastructure with Bicep'
    inputs:
      azureSubscription: '$(AzureServiceConnection)'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az group create --name $(ResourceGroupName) --location $(AzureLocation)
        az deployment group create \
          --resource-group $(ResourceGroupName) \
          --template-file infra/main.bicep \
          --parameters functionAppName=$(FunctionAppName) storageAccountName=$(StorageAccountName) appServicePlanName=$(AppServicePlanName) sqlServerName=$(SqlServerName) sqlAdminLogin=$(SqlAdminLogin) sqlAdminPassword=$(SqlAdminPassword) financialDataApiKey=$(FinancialDataApiKey) stockSymbols=$(StockSymbols) fmpQuoteBaseUrl=$(FmpQuoteBaseUrl) websiteTimeZone=$(WebsiteTimeZone)

  - task: DotNetCoreCLI@2
    displayName: 'Restore NuGet packages'
    inputs:
      command: 'restore'
      projects: '**/*.csproj'

  - task: DotNetCoreCLI@2
    displayName: 'Build solution'
    inputs:
      command: 'build'
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration) --no-restore'

  - task: DotNetCoreCLI@2
    displayName: 'Publish function app'
    inputs:
      command: 'publish'
      publishWebProjects: false
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/publish'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish build artifacts'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/publish'
      ArtifactName: 'drop'

  - task: AzureFunctionApp@2
    displayName: 'Deploy to Azure Functions'
    inputs:
      azureSubscription: '$(AzureServiceConnection)'
      appType: 'functionApp'
      appName: '$(FunctionAppName)'
      package: '$(Build.ArtifactStagingDirectory)/publish'
