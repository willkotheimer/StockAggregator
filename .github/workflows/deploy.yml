name: Deploy Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore app
        run: dotnet restore StockAggregator.csproj

      - name: Restore tests
        run: dotnet restore StockAggregator.Tests/StockAggregator.Tests.csproj

      - name: Build
        run: dotnet build StockAggregator.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish StockAggregator.csproj --configuration Release --no-build --output ./publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.FUNCTION_APP_NAME }}
          package: ./publish

      - name: Run deployment smoke test
        env:
          FUNCTION_APP_URL: ${{ secrets.FUNCTION_APP_URL }}
        run: |
          if [ -z "$FUNCTION_APP_URL" ]; then
            echo "Missing required secret: FUNCTION_APP_URL"
            exit 1
          fi
          dotnet test StockAggregator.Tests/StockAggregator.Tests.csproj --filter FullyQualifiedName~DeploymentSmokeTests
