name: Deploy Web Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'StockAggregatorApp/**'
      - 'StockAggregator.UI/**'
      - '.github/workflows/deploy-webapp.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build the React UI
        working-directory: StockAggregator.UI
        run: |
          npm ci
          npm run build

      - name: Stage UI into the API's wwwroot
        run: |
          rm -rf StockAggregatorApp/wwwroot
          mkdir -p StockAggregatorApp/wwwroot
          cp -r StockAggregator.UI/dist/* StockAggregatorApp/wwwroot/

      - name: Publish the API (includes wwwroot)
        run: dotnet publish StockAggregatorApp/StockAggregatorApp.csproj --configuration Release --output ./publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: stockaggregator-web
          package: ./publish
